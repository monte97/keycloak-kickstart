# rd-auth-server/init/seeds/example.yml
#
# Reference seed for Keycloak initialization.
# Copy this file, fill in values, and mount as /app/seed.yml.
#
# Environment variables are interpolated at runtime:
#   ${VAR}           — required, error if missing
#   ${VAR:-default}  — optional, uses default if missing
#
# All sections except 'name' and 'clients' are optional.

realms:
  - name: my-realm
    theme: custom-theme                         # optional
    ssl_required: "NONE"                        # optional — NONE, EXTERNAL, ALL

    smtp:                                       # optional
      host: "${SMTP_HOST}"
      port: 587
      username: "${SMTP_USER}"
      password: "${SMTP_PASSWORD}"
      ssl: false
      starttls: true
      sender: "${SMTP_SENDER}"

    clients:
      - clientId: my-app
        app_url: "${APP_URL}"
        public_client: true                     # default: true
        direct_access_grants: true              # default: true
        roles: [Admin, User]
        backchannel_logout_url: "http://api:8090/logout"  # optional
        disable_frontchannel_logout: true       # optional

    webhooks:                                   # optional
      - url: "http://sync:8888/webhook"
        events:
          - admin.USER-DELETE
          - admin.CLIENT_ROLE_MAPPING-CREATE
          - admin.CLIENT_ROLE_MAPPING-DELETE
          - admin.GROUP_MEMBERSHIP-CREATE
          - admin.GROUP_MEMBERSHIP-DELETE

    groups:                                     # optional
      - name: engineers
      - name: viewers

    users:                                      # optional
      - username: admin
        password: "${ADMIN_PASSWORD:-admin}"
        roles: [Admin]
        groups: [engineers]
      - username: user
        password: "${USER_PASSWORD:-user}"
        roles: [User]

    user_attributes:                            # optional
      - name: language
        display_name: Language
        permissions:
          view: [admin, user]
          edit: [admin, user]

    admin:                                      # optional
      reset_password: "${KC_ADMIN_PASSWORD}"
      temporary: false
